spring:
  application:
    name: cpmss

  # --- Database ---
  datasource:
    url: jdbc:postgresql://localhost:5432/cpmss_db
    username: cpmss
    password: cpmss_dev
    driver-class-name: org.postgresql.Driver

  # --- JPA ---
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  # --- Flyway ---
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # --- Thymeleaf ---
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8

  # --- Security ---
  security:
    user:
      name: admin
      password: admin

# --- Server ---
server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

# --- Logging ---
logging:
  level:
    root: INFO
    com.cpmss: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
