# Dev profile — H2 in-memory database, no Docker needed
server:
  port: 8081

spring:
  datasource:
    url: jdbc:h2:mem:cpmss;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: false

  thymeleaf:
    cache: false

  security:
    user:
      name: admin
      password: admin
