<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head><title>New Work Order</title></head>
<body>
<div layout:fragment="content">
    <div class="page-header"><div><h1>New Work Order</h1><p>Create a maintenance or service request</p></div></div>
    <div class="glass-panel">
        <form th:action="@{/workorders/new}" th:object="${workOrder}" method="post">
            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label">Service Category *</label>
                    <select class="form-control" th:field="*{serviceCategory}" required>
                        <option value="">— Select —</option>
                        <option value="Plumbing">Plumbing</option>
                        <option value="Electrical">Electrical</option>
                        <option value="HVAC">HVAC</option>
                        <option value="Landscaping">Landscaping</option>
                        <option value="Cleaning">Cleaning</option>
                        <option value="Security">Security</option>
                        <option value="General">General</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Priority</label>
                    <select class="form-control" th:field="*{priority}">
                        <option value="Low">Low</option>
                        <option value="Normal" selected>Normal</option>
                        <option value="High">High</option>
                        <option value="Emergency">Emergency</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Scheduled Date</label>
                    <input type="date" class="form-control" th:field="*{dateScheduled}">
                </div>
                <div class="form-group">
                    <label class="form-label">Estimated Cost</label>
                    <input type="number" step="0.01" class="form-control" th:field="*{costAmount}" placeholder="0.00">
                </div>
            </div>
            <div class="form-group" style="margin-top: 8px;">
                <label class="form-label">Description *</label>
                <textarea class="form-control" th:field="*{description}" required placeholder="Describe the issue or work needed..."></textarea>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">✅ Create Work Order</button>
                <a th:href="@{/workorders}" class="btn">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
