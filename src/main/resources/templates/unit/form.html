<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head><title th:text="${isNew ? 'New Unit' : 'Edit Unit'}">Unit Form</title></head>
<body>
<div layout:fragment="content">
    <div class="page-header"><div><h1 th:text="${isNew ? 'New Unit' : 'Edit Unit'}">Form</h1></div></div>
    <div class="glass-panel">
        <form th:action="${isNew ? '/units/new' : '/units/' + unit.id + '/edit'}" th:object="${unit}" method="post">
            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label">Unit Number *</label>
                    <input class="form-control" th:field="*{unitNumber}" required placeholder="e.g. A-101">
                </div>
                <div class="form-group">
                    <label class="form-label">Building *</label>
                    <select class="form-control" th:field="*{building}">
                        <option value="">— Select Building —</option>
                        <option th:each="b : ${buildings}" th:value="${b.id}" th:text="${b.buildingName}">Building</option>
                    </select>
                </div>
                <div class="form-group"><label class="form-label">Floor</label><input type="number" class="form-control" th:field="*{floorNumber}"></div>
                <div class="form-group"><label class="form-label">Bedrooms</label><input type="number" class="form-control" th:field="*{bedrooms}"></div>
                <div class="form-group"><label class="form-label">Bathrooms</label><input type="number" class="form-control" th:field="*{bathrooms}"></div>
                <div class="form-group"><label class="form-label">Rooms</label><input type="number" class="form-control" th:field="*{rooms}"></div>
                <div class="form-group"><label class="form-label">Area (sq ft)</label><input type="number" step="0.01" class="form-control" th:field="*{squareFootage}"></div>
                <div class="form-group"><label class="form-label">Listing Price</label><input type="number" step="0.01" class="form-control" th:field="*{listingPrice}"></div>
                <div class="form-group">
                    <label class="form-label">View Orientation</label>
                    <select class="form-control" th:field="*{viewOrientation}">
                        <option value="">— Select —</option>
                        <option value="North">North</option><option value="South">South</option>
                        <option value="East">East</option><option value="West">West</option>
                        <option value="Garden">Garden</option><option value="Pool">Pool</option>
                    </select>
                </div>
                <div class="form-group"><label class="form-label">Balconies</label><input type="number" class="form-control" th:field="*{balconies}"></div>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary" th:text="${isNew ? '✅ Create Unit' : '💾 Save'}">Submit</button>
                <a th:href="@{/units}" class="btn">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
